# Torchvision-exact ResNet-18 as a declarative KonfAI graph.
#
# This entry reproduces `torchvision.models.resnet18` **weight-for-weight**: it is built
# only from the curated model-builder registry (Conv/MaxPool/AdaptiveAvgPool/BatchNorm/
# ReLU/Add/Flatten/Linear via the ConvBlock/ResBlock/BlockConfig helpers), yet its
# weighted leaves execute in exactly torchvision's forward order. That means real
# ImageNet weights load straight in through the pretrained bridge:
#
#     import torchvision
#     from konfai.utils.model_builder import build_model_from_yaml
#     from konfai.utils.pretrained import transfer_weights_by_execution_order
#
#     source = torchvision.models.resnet18(weights="IMAGENET1K_V1")
#     target = build_model_from_yaml(yaml_path=".../ResNet18.yml")
#     transfer_weights_by_execution_order(
#         target=target, source=source,
#         target_forward=lambda: list(target.named_forward(x)),
#         source_forward=lambda: source(x),
#     )
#
# BasicBlock ordering (must match torchvision so the bridge pairs leaves 1:1):
#   out = relu(bn1(conv1(x))); out = bn2(conv2(out)); out += downsample(x); out = relu(out)
# The 1x1+bn downsample therefore executes AFTER the two 3x3 convs (on the skip branch),
# so the Shortcut module is placed AFTER ConvBlock_1 below -- not before it.
#
# Stem: conv7x7(stride2)->bn->relu->maxpool3x3(stride2). Head: adaptiveavgpool(1)->flatten->linear.
# The layout is fixed to ResNet-18's [2, 2, 2, 2] basic-block schedule; only `dim`,
# `in_channels`, `num_classes` and the channel `widths` are tunable (keep 5 width entries).
# The defaults build the real ResNet-18 (11,689,512 parameters) so ImageNet weights fit.
name: ResNet18

parameters:
  dim: 2
  in_channels: 3
  num_classes: 1000
  widths: [64, 64, 128, 256, 512]
  stem_configs:
    - $object: BlockConfig
      args:
        kernel_size: 7
        stride: 2
        padding: 3
        bias: false
        activation: ReLU
        norm_mode: BATCH
  conv3_relu_stride1:
    - $object: BlockConfig
      args:
        kernel_size: 3
        stride: 1
        padding: 1
        bias: false
        activation: ReLU
        norm_mode: BATCH
  conv3_relu_stride2:
    - $object: BlockConfig
      args:
        kernel_size: 3
        stride: 2
        padding: 1
        bias: false
        activation: ReLU
        norm_mode: BATCH
  conv3_linear_stride1:
    - $object: BlockConfig
      args:
        kernel_size: 3
        stride: 1
        padding: 1
        bias: false
        activation: "None"
        norm_mode: BATCH
  shortcut_configs:
    - $object: BlockConfig
      args:
        kernel_size: 1
        stride: 2
        padding: 0
        bias: false
        activation: "None"
        norm_mode: BATCH

network:
  in_channels: ${in_channels}
  dim: ${dim}
  init_type: trunc_normal
  init_gain: 0.02

modules:
  - name: ResNetEncoder
    modules:
      - name: ResNetStem
        modules:
          - name: ConvBlock
            type: ConvBlock
            args:
              in_channels: ${in_channels}
              out_channels: ${widths.0}
              block_configs: ${stem_configs}
              dim: ${dim}
              alias: [["conv1"], ["bn1"], []]
          - name: MaxPool
            type: MaxPool
            args:
              dim: ${dim}
              kernel_size: 3
              stride: 2
              padding: 1

      - name: ResNetStage_0
        alias: [layer1]
        modules:
          - name: BasicBlock_0
            alias: ["0"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.0}
                  out_channels: ${widths.1}
                  block_configs: ${conv3_relu_stride1}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.1}
                  out_channels: ${widths.1}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU
          - name: BasicBlock_1
            alias: ["1"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.1}
                  out_channels: ${widths.1}
                  block_configs: ${conv3_relu_stride1}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.1}
                  out_channels: ${widths.1}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU

      - name: ResNetStage_1
        alias: [layer2]
        modules:
          - name: BasicBlock_0
            alias: ["0"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.1}
                  out_channels: ${widths.2}
                  block_configs: ${conv3_relu_stride2}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.2}
                  out_channels: ${widths.2}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Shortcut
                type: ConvBlock
                in_branch: [1]
                out_branch: [1]
                alias: [downsample]
                args:
                  in_channels: ${widths.1}
                  out_channels: ${widths.2}
                  block_configs: ${shortcut_configs}
                  dim: ${dim}
                  alias: [["0"], ["1"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU
          - name: BasicBlock_1
            alias: ["1"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.2}
                  out_channels: ${widths.2}
                  block_configs: ${conv3_relu_stride1}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.2}
                  out_channels: ${widths.2}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU

      - name: ResNetStage_2
        alias: [layer3]
        modules:
          - name: BasicBlock_0
            alias: ["0"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.2}
                  out_channels: ${widths.3}
                  block_configs: ${conv3_relu_stride2}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.3}
                  out_channels: ${widths.3}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Shortcut
                type: ConvBlock
                in_branch: [1]
                out_branch: [1]
                alias: [downsample]
                args:
                  in_channels: ${widths.2}
                  out_channels: ${widths.3}
                  block_configs: ${shortcut_configs}
                  dim: ${dim}
                  alias: [["0"], ["1"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU
          - name: BasicBlock_1
            alias: ["1"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.3}
                  out_channels: ${widths.3}
                  block_configs: ${conv3_relu_stride1}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.3}
                  out_channels: ${widths.3}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU

      - name: ResNetStage_3
        alias: [layer4]
        modules:
          - name: BasicBlock_0
            alias: ["0"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.3}
                  out_channels: ${widths.4}
                  block_configs: ${conv3_relu_stride2}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.4}
                  out_channels: ${widths.4}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Shortcut
                type: ConvBlock
                in_branch: [1]
                out_branch: [1]
                alias: [downsample]
                args:
                  in_channels: ${widths.3}
                  out_channels: ${widths.4}
                  block_configs: ${shortcut_configs}
                  dim: ${dim}
                  alias: [["0"], ["1"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU
          - name: BasicBlock_1
            alias: ["1"]
            modules:
              - name: ConvBlock_0
                type: ConvBlock
                args:
                  in_channels: ${widths.4}
                  out_channels: ${widths.4}
                  block_configs: ${conv3_relu_stride1}
                  dim: ${dim}
                  alias: [["conv1"], ["bn1"], []]
              - name: ConvBlock_1
                type: ConvBlock
                args:
                  in_channels: ${widths.4}
                  out_channels: ${widths.4}
                  block_configs: ${conv3_linear_stride1}
                  dim: ${dim}
                  alias: [["conv2"], ["bn2"], []]
              - name: Residual
                type: Add
                in_branch: [0, 1]
              - name: ReLU
                type: ReLU

  - name: Head
    modules:
      - name: AdaptiveAvgPool
        type: AdaptiveAvgPool
        args:
          dim: ${dim}
          output_size: 1
      - name: Flatten
        type: Flatten
        args:
          start_dim: 1
      - name: Linear
        type: Linear
        alias: [fc]
        args:
          in_features: ${widths.4}
          out_features: ${num_classes}
