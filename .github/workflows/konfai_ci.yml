name: konfai_ci

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/konfai_ci.yml"
      - "konfai/**"
      - "konfai-apps/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/konfai_ci.yml"
      - "konfai/**"
      - "konfai-apps/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"

jobs:
  konfai_ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Pin gloo to the loopback interface on macOS
        if: runner.os == 'macOS'
        run: echo "GLOO_SOCKET_IFNAME=lo0" >> "$GITHUB_ENV"
      - name: Run pytest
        run: |
          pytest -q tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.2

      - name: Run ruff lint
        run: ruff check konfai konfai-apps/konfai_apps tests

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.2

      - name: Check formatting
        run: ruff format --check konfai konfai-apps/konfai_apps tests

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build setuptools-scm

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Verify the wheel ships the model catalog and no sibling package
        # The test job installs editable, which hides PEP 420 (konfai/models/python has no __init__.py)
        # and package-data (the catalog *.yml) breakage. Inspect the built artifact directly.
        run: |
          python - <<'PY'
          import glob, zipfile
          names = zipfile.ZipFile(glob.glob("dist/*.whl")[0]).namelist()
          py = sum(1 for n in names if "/models/python/" in n and n.endswith(".py"))
          yml = sum(1 for n in names if "/models/yaml/" in n and n.endswith(".yml"))
          leaked = [n for n in names if n.split("/", 1)[0].endswith("-apps") or n.split("/", 1)[0] == "konfai_apps"]
          assert py >= 16, f"models/python underpopulated in the wheel: {py} files"
          assert yml == 14, f"catalog .yml count wrong in the wheel: {yml}"
          assert not leaked, f"hyphenated sibling leaked into the wheel: {leaked[:3]}"
          print(f"wheel OK: {py} models/python files, {yml} catalog .yml, no sibling leak")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: konfai-wheel
          path: dist/*.whl
