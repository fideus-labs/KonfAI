# The YAML form of this example's baseline generator (Model.py:UNetpp5): a
# segmentation_models_pytorch UnetPlusPlus (resnet34 encoder, 5 input channels, 1 output)
# followed by a Tanh head, reproduced node-for-node from the curated registry only.
# It exposes the same 'Head:Tanh' output as UNetpp5, so Config.yml works unchanged with
# either 'classpath: Model:UNetpp5' or 'classpath: UNetpp.yml'. Large because an smp UNet++
# is genuinely ~117 conv layers -- this proves even an encoder-backed model can be declarative;
# in practice 'classpath: segmentation.smp.SMP' is the compact alternative for the smp backbone.
# The GAN training loop (Config_GAN.yml) stays Python: its adversarial forward is not a graph.
name: UNetpp
network:
  in_channels: 5
  dim: 2
modules:
- name: enc_conv1
  type: Conv
  out_branch:
  - e_c1
  args:
    dim: 2
    in_channels: 5
    out_channels: 64
    kernel_size: 7
    stride: 2
    padding: 3
    bias: false
- name: enc_bn1
  type: BatchNorm
  in_branch:
  - e_c1
  out_branch:
  - e_c1
  args:
    dim: 2
    num_features: 64
- name: enc_relu
  type: ReLU
  in_branch:
  - e_c1
  out_branch:
  - e_c1
  args: {}
- name: enc_maxpool
  type: MaxPool
  in_branch:
  - e_c1
  out_branch:
  - mp
  args:
    dim: 2
    kernel_size: 3
    stride: 2
    padding: 1
- name: l1_b0_conv1
  type: Conv
  in_branch:
  - mp
  out_branch:
  - l1_b0_m
  args:
    dim: 2
    in_channels: 64
    out_channels: 64
    kernel_size: 3
    stride: 1
    padding: 1
    bias: false
- name: l1_b0_bn1
  type: BatchNorm
  in_branch:
  - l1_b0_m
  out_branch:
  - l1_b0_m
  args:
    dim: 2
    num_features: 64
- name: l1_b0_relu1
  type: ReLU
  in_branch:
  - l1_b0_m
  out_branch:
  - l1_b0_m
